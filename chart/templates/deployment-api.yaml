apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "product-management.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app: product-api
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /api/v1/q/metrics
        prometheus.io/port: "8080"
      labels:
        app: product-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: product-api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          envFrom:
            - configMapRef:
                name: product-api-config
            - secretRef:
                name: mongo-secret
            - secretRef:
                name: kafka-credentials
          env:
            # optional: true means these are simply absent (not an error) if the jwt-keys Secret
            # doesn't exist yet, e.g. on a `helm template`/manual apply that skips hooks — in that
            # case EphemeralJwtKeyConfigSource generates an in-process key instead. On a real
            # `helm install`/`upgrade` the pre-install/pre-upgrade Job in jwt-keys-job.yaml creates
            # this Secret before the Deployment is ever applied, so all replicas share one key.
            - name: SMALLRYE_JWT_SIGN_KEY
              valueFrom:
                secretKeyRef:
                  name: jwt-keys
                  key: privateKey.pem
                  optional: true
            - name: MP_JWT_VERIFY_PUBLICKEY
              valueFrom:
                secretKeyRef:
                  name: jwt-keys
                  key: publicKey.pem
                  optional: true
          ports:
            - containerPort: 8080
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/v1/q/health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/q/health/ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/v1/q/health/live
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
      volumes:
        - name: tmp
          emptyDir: {}
