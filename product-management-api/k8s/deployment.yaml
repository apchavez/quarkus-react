apiVersion: apps/v1
kind: Deployment

metadata:
  name: product-api

spec:
  replicas: 2

  selector:
    matchLabels:
      app: product-api

  template:
    metadata:
      labels:
        app: product-api

    spec:
      containers:
      - name: product-api
        image: product-api:v1
        imagePullPolicy: IfNotPresent

        envFrom:
        - configMapRef:
            name: product-api-config
        - secretRef:
            name: mongo-secret

        ports:
        - containerPort: 8080