apiVersion: v1
kind: Secret

metadata:
  name: mongo-secret

type: Opaque

# DO NOT commit real credentials here.
# Create the secret manually before applying other manifests:
#
#   kubectl create secret generic mongo-secret \
#     --from-literal=MONGO_USERNAME=<your-username> \
#     --from-literal=MONGO_PASSWORD=<your-password> \
#     --from-literal=MONGODB_CONNECTION_STRING=mongodb://<your-username>:<your-password>@mongo-service:27017
#
# Or use Sealed Secrets / External Secrets Operator for GitOps workflows.
stringData:
  MONGO_USERNAME: ""
  MONGO_PASSWORD: ""
  MONGODB_CONNECTION_STRING: ""
